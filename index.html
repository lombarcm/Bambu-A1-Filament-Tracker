<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filament Tracker</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.webmanifest">

    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #f4f4f4;
        }

        h1 {
            text-align: center;
        }

        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px #ccc;
        }

        .spool {
            background: #eee;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
        }

        .spool.low {
            background: #ffb3b3;
        }

        .spool.warn {
            background: #ffe6a1;
        }

        button {
            margin: 5px 0;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            background: #0078ff;
            color: white;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

        button.delete {
            background: #d9534f;
        }
    </style>
</head>
<body>

<h1>Filament Tracker</h1>

<div class="container">

    <h3>Add New Spool</h3>
    <input id="spoolName" placeholder="Spool name"><br><br>
    <input id="startWeight" type="number" placeholder="Starting weight (g)"><br><br>
    <button onclick="addSpool()">Add Spool</button>

    <hr>

    <h3>Subtract Usage</h3>
    <select id="spoolSelect"></select><br><br>
    <input id="usedAmount" type="number" placeholder="Used amount (g)"><br><br>
    <button onclick="subtractUsage()">Subtract</button>

    <hr>

    <h3>Inventory</h3>
    <div id="inventoryList"></div>

</div>

<!-- Firebase + App Logic -->
<script>
    // ---------------------------
    // SERVICE WORKER
    // ---------------------------
    if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js");
    }

    // ---------------------------
    // FIREBASE CONFIG
    // ---------------------------
    const firebaseConfig = {
        // 🔥 YOUR FIREBASE CONFIG GOES HERE
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let userId = "defaultUser"; 
    let spools = [];
    let sortMode = "name_asc";

    // ---------------------------
    // REALTIME SYNC
    // ---------------------------
    db.collection("users").doc(userId).collection("spools")
        .onSnapshot(snapshot => {
            spools = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            refreshUI();
        });

    // ---------------------------
    // FIREBASE HELPERS
    // ---------------------------
    function saveSpool(data) {
        db.collection("users").doc(userId).collection("spools").add(data);
    }

    function updateSpool(id, data) {
        db.collection("users").doc(userId).collection("spools").doc(id).update(data);
    }

    // ---------------------------
    // UI LOGIC (UPDATED)
    // ---------------------------
    function sortSpools() {
        if (sortMode === "name_asc") spools.sort((a,b) => a.name.localeCompare(b.name));
        if (sortMode === "name_desc") spools.sort((a,b) => b.name.localeCompare(a.name));
        if (sortMode === "remaining_asc") spools.sort((a,b) => a.remaining - b.remaining);
        if (sortMode === "remaining_desc") spools.sort((a,b) => b.remaining - a.remaining);
    }

    function refreshUI() {
        sortSpools();

        let select = document.getElementById("spoolSelect");
        let list = document.getElementById("inventoryList");

        select.innerHTML = "";
        list.innerHTML = "";

        spools.forEach(s => {
            let opt = document.createElement("option");
            opt.value = s.id;
            opt.textContent = s.name;
            select.appendChild(opt);

            let div = document.createElement("div");
            div.className = "spool";

            if (s.remaining < 100) div.classList.add("low");
            else if (s.remaining < 250) div.classList.add("warn");

            div.innerHTML = `
                <strong>${s.name}</strong><br>
                Remaining: ${s.remaining} g<br><br>

                <button onclick="resetWeight('${s.id}')">Reset Weight</button>
                <button class="delete" onclick="deleteSpool('${s.id}')">Delete</button>
            `;

            list.appendChild(div);
        });

        checkLowFilament();
    }

    // ---------------------------
    // LOW FILAMENT ALERT SYSTEM
    // ---------------------------
    function checkLowFilament() {
        let low = spools.filter(s => s.remaining < 100);

        if (low.length > 0) {
            let names = low.map(s => s.name).join(", ");
            alert(`⚠️ Low filament warning:\n${names}`);
        }
    }

    // ---------------------------
    // ADD SPOOL
    // ---------------------------
    function addSpool() {
        let name = document.getElementById("spoolName").value.trim();
        let start = parseFloat(document.getElementById("startWeight").value);

        if (!name || isNaN(start)) {
            alert("Enter valid spool name and weight.");
            return;
        }

        saveSpool({ name, starting: start, remaining: start });

        document.getElementById("spoolName").value = "";
        document.getElementById("startWeight").value = "";
    }

    // ---------------------------
    // SUBTRACT USAGE
    // ---------------------------
    function subtractUsage() {
        let id = document.getElementById("spoolSelect").value;
        let used = parseFloat(document.getElementById("usedAmount").value);

        if (!id || isNaN(used)) {
            alert("Enter valid usage.");
            return;
        }

        let spool = spools.find(s => s.id === id);
        if (!spool) return;

        updateSpool(id, { remaining: Math.max(0, spool.remaining - used) });

        document.getElementById("usedAmount").value = "";
    }

    // ---------------------------
    // RESET WEIGHT
    // ---------------------------
    function resetWeight(id) {
        let newWeight = prompt("Enter new remaining weight (g):");
        let weight = parseFloat(newWeight);

        if (!isNaN(weight)) {
            updateSpool(id, { remaining: weight });
        }
    }

    // ---------------------------
    // DELETE SPOOL
    // ---------------------------
    function deleteSpool(id) {
        if (confirm("Delete this spool?")) {
            db.collection("users").doc(userId).collection("spools").doc(id).delete();
        }
    }
</script>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

</body>
</html>
