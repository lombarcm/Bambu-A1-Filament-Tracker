<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Filament Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0078ff">

<style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f4f4f4; }
    h1 { text-align: center; }
    .card {
        background: white; padding: 20px; border-radius: 10px;
        margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    label { font-weight: bold; }
    input, select, button {
        width: 100%; padding: 12px; margin-top: 8px; margin-bottom: 16px;
        border-radius: 6px; border: 1px solid #ccc; font-size: 16px;
    }
    button { background: #0078ff; color: white; border: none; cursor: pointer; }
    button:hover { background: #005fcc; }
    .spool {
        padding: 10px; background: #fff; border-radius: 6px;
        margin-bottom: 10px; border-left: 6px solid #0078ff;
    }
    .low { border-left-color: red; }
    .warn { border-left-color: orange; }
    .header-row {
        display: flex; gap: 10px; align-items: center; margin-bottom: 10px;
    }
    .header-row select { flex: 1; }
</style>
</head>
<body>

<h1>Filament Tracker</h1>

<!-- Add Spool -->
<div class="card">
    <h2>Add Filament Spool</h2>
    <label>Spool Name</label>
    <input id="spoolName">

    <label>Starting Weight (g)</label>
    <input id="startWeight" type="number">

    <button onclick="addSpool()">Add Spool</button>
</div>

<!-- Subtract Usage -->
<div class="card">
    <h2>Subtract Usage</h2>
    <label>Select Spool</label>
    <select id="spoolSelect"></select>

    <label>Used (g)</label>
    <input id="usedAmount" type="number">

    <button onclick="subtractUsage()">Apply Usage</button>
</div>

<!-- Inventory -->
<div class="card">
    <div class="header-row">
        <h2 style="margin:0;">Spool Inventory</h2>
        <select id="sortSelect" onchange="changeSort()">
            <option value="name_asc">Name ↑</option>
            <option value="name_desc">Name ↓</option>
            <option value="remaining_desc">Remaining ↑</option>
            <option value="remaining_asc">Remaining ↓</option>
        </select>
    </div>
    <div id="inventoryList"></div>
</div>

<script>
// Register service worker for PWA
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}

// ---------------------------
// FIREBASE CONFIG (YOUR DATA)
// ---------------------------
const firebaseConfig = {
  apiKey: "AIzaSyAWj3-PhEzQ80c5nDoPHWzuxet1EMiftqg",
  authDomain: "filament-tracker-26640.firebaseapp.com",
  projectId: "filament-tracker-26640",
  storageBucket: "filament-tracker-26640.firebasestorage.app",
  messagingSenderId: "20991907584",
  appId: "1:20991907584:web:fa5e2c05e2f2beec73c5e5",
  measurementId: "G-X102PGTVZN"
};

// ---------------------------
// LOAD FIREBASE SDKs
// ---------------------------
const script1 = document.createElement('script');
script1.src = "https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js";
document.head.appendChild(script1);

const script2 = document.createElement('script');
script2.src = "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js";
document.head.appendChild(script2);

let app, db;
let userId = "default_user"; // You can customize this later
let spools = [];
let sortMode = "name_asc";

// ---------------------------
// INIT FIREBASE
// ---------------------------
function initFirebase() {
    app = firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    subscribeSpools();
}

// ---------------------------
// REALTIME SYNC
// ---------------------------
function subscribeSpools() {
    db.collection("users").doc(userId).collection("spools")
      .onSnapshot(snapshot => {
        spools = [];
        snapshot.forEach(doc => {
            let d = doc.data();
            spools.push({
                id: doc.id,
                name: d.name,
                starting: d.starting,
                remaining: d.remaining
            });
        });
        refreshUI();
      });
}

function saveSpool(spool) {
    db.collection("users").doc(userId).collection("spools").add(spool);
}

function updateSpool(id, data) {
    db.collection("users").doc(userId).collection("spools").doc(id).update(data);
}

// ---------------------------
// UI LOGIC
// ---------------------------
function sortSpools() {
    if (sortMode === "name_asc") spools.sort((a,b) => a.name.localeCompare(b.name));
    if (sortMode === "name_desc") spools.sort((a,b) => b.name.localeCompare(a.name));
    if (sortMode === "remaining_asc") spools.sort((a,b) => a.remaining - b.remaining);
    if (sortMode === "remaining_desc") spools.sort((a,b) => b.remaining - a.remaining);
}

function refreshUI() {
    sortSpools();

    let select = document.getElementById("spoolSelect");
    let list = document.getElementById("inventoryList");

    select.innerHTML = "";
    list.innerHTML = "";

    spools.forEach(s => {
        let opt = document.createElement("option");
        opt.value = s.id;
        opt.textContent = s.name;
        select.appendChild(opt);

        let div = document.createElement("div");
        div.className = "spool";

        if (s.remaining < 100) div.classList.add("low");
        else if (s.remaining < 250) div.classList.add("warn");

        div.innerHTML = `
            <strong>${s.name}</strong><br>
            Remaining: ${s.remaining} g
        `;
        list.appendChild(div);
    });
}

function addSpool() {
    let name = document.getElementById("spoolName").value.trim();
    let start = parseFloat(document.getElementById("startWeight").value);

    if (!name || isNaN(start)) {
        alert("Enter valid spool name and weight.");
        return;
    }

    saveSpool({ name, starting: start, remaining: start });

    document.getElementById("spoolName").value = "";
    document.getElementById("startWeight").value = "";
}

function subtractUsage() {
    let id = document.getElementById("spoolSelect").value;
    let used = parseFloat(document.getElementById("usedAmount").value);

    if (!id || isNaN(used)) {
        alert("Enter valid usage.");
        return;
    }

    let spool = spools.find(s => s.id === id);
    if (!spool) return;

    updateSpool(id, { remaining: Math.max(0, spool.remaining - used) });

    document.getElementById("usedAmount").value = "";
}

function changeSort() {
    sortMode = document.getElementById("sortSelect").value;
    refreshUI();
}

// Wait for Firebase scripts to load
window.addEventListener('load', () => {
    setTimeout(() => {
        if (window.firebase) initFirebase();
        else alert("Firebase failed to load.");
    }, 500);
});
</script>

</body>
</html>
